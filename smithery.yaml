startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      dataDir:
        type: string
        description: "Directory for storing audit logs (defaults to ~/.agent-audit-trail)"
        default: ""
    required: []
  commandFunction: |-
    (config) => ({
      command: 'node',
      args: ['dist/index.js'],
      env: {
        ...(config.dataDir ? { AUDIT_DATA_DIR: config.dataDir } : {})
      }
    })
